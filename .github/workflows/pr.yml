name: PR

# Validates pull requests by building the Docker image (without pushing).
# For Dependabot PRs, if that build succeeds the PR is merged automatically.

on:
  pull_request:

# Read-only by default; the auto-merge job opts into write below.
permissions:
  contents: read

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  auto-merge:
    name: Auto-merge Dependabot PR
    needs: docker-build          # only runs if the build succeeded
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write            # merge the PR
      pull-requests: write        # update PR state
    steps:
      # --- Optional: merge as a GitHub App so the merge triggers Part 2 -------
      # A merge made with the automatic GITHUB_TOKEN pushes to master as
      # github-actions[bot], and events from that token do NOT trigger other
      # workflows — so release.yml won't run. To chain automatically, merge
      # with a GitHub App token instead (search "APP TOKEN" below). See the
      # README section "Cross-workflow triggering". A fine-grained PAT works too.
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      # Optional: expose update metadata (version bump type, etc.) so you can
      # gate merges — e.g. only auto-merge patch/minor. Left permissive here.
      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2

      - name: Merge the PR
        env:
          # GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---
          # APP TOKEN: replace the line above with this so the merge commit is
          # authored by the app and therefore triggers release.yml.
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          # ---
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: gh pr merge --merge "$PR_URL"
