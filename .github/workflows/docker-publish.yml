name: Docker Publish

# Part 3: When a GitHub Release (and its tag) is published — either by the
# semantic-release job or by hand — build the Docker image and push it to
# Docker Hub. docker/metadata-action turns a semver tag like `v3.2.1` into the
# conventional set of Docker tags:
#
#   3.2.1  ->  latest, 3, 3.2, 3.2.1
#
# The rolling tags (latest, 3, 3.2) are only moved when the release being built
# is actually the newest in that scope, so retrofitting an older version — e.g.
# publishing 1.2.3 while 3.2.1 already exists — pushes only the exact `1.2.3`
# tag and leaves `latest`, `3`, `3.2` untouched.
#
# A pre-release such as `v3.2.1-rc.1` is pushed with its full tag only and is
# NOT tagged `latest`.

on:
  release:
    types: [published]
  # Also allow triggering directly from a pushed tag (e.g. manual tagging).
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  # Docker Hub repository to publish to, e.g. "myuser/myapp".
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Need the full tag history so we can tell whether this release is the
        # newest one before we let it claim rolling tags.
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Decide which rolling tags this version may claim
        id: rolling
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          # Version being built, without the leading "v" (e.g. 3.2.1).
          cur="${REF_NAME#v}"

          # Pre-releases (v3.2.1-rc.1) never move latest/major/minor tags.
          if [[ "$cur" == *-* ]]; then
            printf 'is_latest=false\nis_major=false\nis_minor=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # All published, non-prerelease semver tags (includes the current one).
          tags=$(git tag -l 'v*.*.*' | sed 's/^v//' | grep -v -- '-' || true)
          IFS=. read -r maj min _ <<< "$cur"

          highest()      { printf '%s\n' "$tags" | sort -V | tail -1; }
          highest_major(){ printf '%s\n' "$tags" | awk -F. -v M="$maj" '$1==M' | sort -V | tail -1; }
          highest_minor(){ printf '%s\n' "$tags" | awk -F. -v M="$maj" -v N="$min" '$1==M && $2==N' | sort -V | tail -1; }

          # A rolling tag may point at this version only if this version is the
          # newest in the relevant scope. Guards against retrofitting an older
          # release (e.g. publishing 1.2.3 while 3.2.1 already exists).
          [[ "$cur" == "$(highest)"       ]] && il=true || il=false
          [[ "$cur" == "$(highest_major)" ]] && im=true || im=false
          [[ "$cur" == "$(highest_minor)" ]] && in=true || in=false
          printf 'is_latest=%s\nis_major=%s\nis_minor=%s\n' "$il" "$im" "$in" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          # The exact version is always pushed. The rolling tags (latest, major,
          # major.minor) are only pushed when this release is the newest in that
          # scope, so retrofitting an older version can't clobber a newer one.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.rolling.outputs.is_minor }}
            type=semver,pattern={{major}},enable=${{ steps.rolling.outputs.is_major }}
            type=raw,value=latest,enable=${{ steps.rolling.outputs.is_latest }}
          flavor: |
            latest=false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
