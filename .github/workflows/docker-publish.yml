name: Docker Publish

# Part 3: When a GitHub Release (and its tag) is published — either by the
# semantic-release job or by hand — build the Docker image and push it to
# Docker Hub. docker/metadata-action turns a semver tag like `v3.2.1` into the
# conventional set of Docker tags:
#
#   3.2.1  ->  latest, 3, 3.2, 3.2.1
#
# A pre-release such as `v3.2.1-rc.1` is pushed with its full tag only and is
# NOT tagged `latest`.

on:
  release:
    types: [published]
  # Also allow triggering directly from a pushed tag (e.g. manual tagging).
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

env:
  # Docker Hub repository to publish to, e.g. "myuser/myapp".
  IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # semver patterns produce 3.2.1, 3.2 and 3 from a v3.2.1 tag.
          # `latest` is added automatically for non-prerelease semver tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          flavor: |
            latest=auto

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
