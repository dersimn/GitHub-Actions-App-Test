name: Release

# Part 2: When a commit lands on master, run semantic-release. Based on the
# Conventional Commit messages since the last release it decides the next
# version, creates the git tag, and publishes a GitHub Release. Creating that
# release is what triggers the docker-publish workflow (Part 3).

on:
  push:
    branches:
      - master
      - main

# Prevent two releases from racing if commits land close together.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # create tags and releases
  issues: write          # semantic-release comments on issues/PRs
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # --- Optional: act as a GitHub App so the release triggers Part 3 -------
      # The automatic GITHUB_TOKEN cannot trigger other workflows, so the
      # GitHub Release created below will NOT start docker-publish.yml. To make
      # the handoff automatic, generate a GitHub App token and use it in place
      # of GITHUB_TOKEN (search "APP TOKEN" below). See the README section
      # "Cross-workflow triggering" for setup. A fine-grained PAT works too.
      #
      # - name: Generate app token
      #   id: app-token
      #   uses: actions/create-github-app-token@v1
      #   with:
      #     app-id: ${{ vars.RELEASE_APP_ID }}
      #     private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history and tags are required for semantic-release to work
          # out the previous version.
          fetch-depth: 0
          persist-credentials: false
          # APP TOKEN: uncomment so the tag push is authored by the app (else
          # it stays github-actions[bot] and won't trigger docker-publish.yml).
          # token: ${{ steps.app-token.outputs.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # APP TOKEN: replace the line above with this so the GitHub Release is
          # authored by the app and therefore triggers docker-publish.yml.
          # GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        # commit-analyzer, release-notes-generator and github ship bundled with
        # semantic-release, so installing the one package is enough; .releaserc
        # selects which plugins run. Add -p only for non-bundled plugins.
        run: npx --yes semantic-release@23
